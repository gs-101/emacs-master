name: Build Emacs

on:
  push:
    branches:
      - 'scratch'

jobs:
  build-emacs:
    runs-on: ubuntu-latest
    steps:
    - name: Guix Cache
      uses: actions/cache@v4.2.0
      with:
        path: ~/.cache/guix
        # Use a key that (almost) never matches
        key: guix-cache-${{ github.sha }}
        restore-keys: |
          guix-cache-
    - name: Install Guix
      uses: PromyLOPh/guix-install-action@v1.5
      with:
        channels: |-
          (cons* (channel
                  (name 'emacs-master)
                  (url "https://github.com/gs-101/emacs-master.git")
                  (branch "scratch")
                  (introduction
                   (make-channel-introduction
                    "1ddb3d07a47c5e2bfbc347b927836f28b64104d2"
                    (openpgp-fingerprint
                     "3049 BF6C 0829 94E4 38ED  4A15 3033 E0E9 F7E2 5FE4"))))
                 %default-channels)
    - name: Build Emacs
      run: guix build emacs-master-pgtk --fallback
